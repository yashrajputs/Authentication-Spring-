server:
  port: 8082

# database connection
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app_yr
    username: root
    password: Yash321!@
    driver-class-name: com.mysql.cj.jdbc.Driver
  #  hikari:
